<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 後慈湖｜即時人流監控</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; /* 深藍底色，更有科技感 */
            --card: #1e293b;
            --primary: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 15px; }
        h1 { margin: 0; font-size: 24px; font-weight: 900; }
        .last-update { font-size: 14px; color: #94a3b8; }

        /* 核心數字卡片 */
        .main-card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .label { font-size: 16px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .count { font-size: 100px; font-weight: 900; color: var(--primary); margin: 10px 0; text-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }
        
        /* 進度條優化 */
        .progress-box { width: 85%; margin: 20px auto; }
        .progress-container { height: 16px; background: #334155; border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
        .progress-bar { height: 100%; width: 0%; background: var(--success); transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .capacity-info { display: flex; justify-content: space-between; font-size: 13px; color: #64748b; }

        /* 次要統計 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mini-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; text-align: center; }
        .mini-num { font-size: 32px; font-weight: 900; margin-top: 5px; }

        /* 按鈕 */
        .refresh-btn { 
            position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: #000; 
            border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px;
            cursor: pointer; box-shadow: 0 10px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .refresh-btn:hover { transform: rotate(180deg); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>⛰️ 後慈湖</h1>
            <div class="last-update" id="updateTime">系統連線中...</div>
        </div>
        <div id="connectionStatus" style="font-size: 12px; padding: 5px 12px; border-radius: 20px; background: #334155;">● 實時連線</div>
    </header>

    <div class="main-card">
        <div class="label">當前場內總人數</div>
        <div class="count" id="currentCount">0</div>
        
        <div class="progress-box">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="capacity-info">
                <span>目前負荷</span>
                <span id="capacityPercent">0%</span>
                <span>上限 500 人</span>
            </div>
        </div>
        <div id="statusText" style="margin-top:15px; font-weight:700;">狀態：讀取中...</div>
    </div>

    <div class="stats-grid">
        <div class="mini-card">
            <div class="label">今日入園</div>
            <div class="mini-num" id="totalIn" style="color: var(--success);">--</div>
        </div>
        <div class="mini-card">
            <div class="label">今日離園</div>
            <div class="mini-num" id="totalOut" style="color: var(--danger);">--</div>
        </div>
    </div>
</div>

<button class="refresh-btn" onclick="fetchData()">🔄</button>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
    const MAX_CAPACITY = 500;

    async function fetchData() {
        const updateTimeEl = document.getElementById('updateTime');
        const countEl = document.getElementById('currentCount');
        const bar = document.getElementById('progressBar');
        
        try {
            updateTimeEl.innerText = "⏳ 更新數據中...";
            const res = await fetch(API_URL + "?action=getCount");
            const data = await res.json();
            
            const current = data.current || 0;
            
            // 數字動畫 (簡單版)
            animateValue("currentCount", parseInt(countEl.innerText) || 0, current, 1000);
            
            // 更新進度條
            const percent = Math.floor((current / MAX_CAPACITY) * 100);
            bar.style.width = Math.min(percent, 100) + "%";
            document.getElementById('capacityPercent').innerText = percent + "%";
            
            // 變色與狀態邏輯
            if (percent >= 90) {
                bar.style.backgroundColor = "var(--danger)";
                document.getElementById('statusText').innerText = "🚨 極度擁擠：立即停止進入";
                document.getElementById('statusText').style.color = "var(--danger)";
            } else if (percent >= 70) {
                bar.style.backgroundColor = "var(--warning)";
                document.getElementById('statusText').innerText = "⚠️ 人流較多：建議緩衝";
                document.getElementById('statusText').style.color = "var(--warning)";
            } else {
                bar.style.backgroundColor = "var(--success)";
                document.getElementById('statusText').innerText = "✅ 人流正常";
                document.getElementById('statusText').style.color = "var(--success)";
            }

            // 更新累計數字 (需 GAS 支援，若不支援則顯示目前的資料)
            document.getElementById('totalIn').innerText = data.in || "--";
            document.getElementById('totalOut').innerText = data.out || "--";
            
            updateTimeEl.innerText = "最後同步：" + new Date().toLocaleTimeString();
            document.getElementById('connectionStatus').style.color = "var(--success)";

        } catch (e) {
            updateTimeEl.innerText = "❌ 斷開連線 (請檢查網路)";
            document.getElementById('connectionStatus').style.color = "var(--danger)";
        }
    }

    // 數字跳動動畫效果
    function animateValue(id, start, end, duration) {
        let obj = document.getElementById(id);
        let range = end - start;
        let minTimer = 50;
        let stepTime = Math.abs(Math.floor(duration / range));
        stepTime = Math.max(stepTime, minTimer);
        let startTime = new Date().getTime();
        let endTime = startTime + duration;
        let timer;

        function run() {
            let now = new Date().getTime();
            let remaining = Math.max((endTime - now) / duration, 0);
            let value = Math.round(end - (remaining * range));
            obj.innerText = value;
            if (value == end) clearInterval(timer);
        }
        timer = setInterval(run, stepTime);
        run();
    }

    // 初始化與定時刷新
    window.onload = fetchData;
    setInterval(fetchData, 30000); // 30秒更新一次
</script>

</body>
</html>
